# ==============================================================================
#                 nas-monitor Daemon Configuration File
# ==============================================================================
# Target Path: /etc/nas-monitor.conf
# Please adjust the values below to match your specific hardware configuration.
# Use the "Hardware Discovery Helper" section of the README to locate system paths.

# ==============================================================================
# 01. RUNTIME & SYSTEM ENVIRONMENT
# ==============================================================================

# Debug Output
# Set to 1 to force verbose debug logging to stdout even when running as a background daemon.
# Critical errors and panic messages are always sent to syslog regardless of this setting.
debug_enabled=0

# Primary Storage Mount Point
# Used for disk utilization, space monitoring, and the 'disk_almost_full' LED purpose.
storage_mount=/mnt/storage


# ==============================================================================
# 02. MQTT & HOME ASSISTANT INTEGRATION
# ==============================================================================

# MQTT Connection Settings
mqtt_enabled=0
mqtt_address=tcp://192.168.1.234:5678
client_id=Cloudstation
username=mqtt_user
password=secret

# Home Assistant Integration
# Auto-publishes Home Assistant Discovery payloads under 'homeassistant/'
ha_discovery_enabled=1

# Home Assistant Switch/Button Entity Visibility (0 = Hidden, 1 = Exposed)
# These control whether management switches/buttons are exposed to Home Assistant.
# Ensure all vital write paths are offloaded to tmpfs before toggling read-only modes.
mqtt_btn_mode_rw_enabled=0     # File system read-write toggle
mqtt_btn_mode_ro_enabled=0     # File system read-only toggle
mqtt_btn_reboot_enabled=0      # System reboot trigger
mqtt_btn_shutdown_enabled=0    # System immediate shutdown trigger
mqtt_btn_sleep_enabled=0       # System standby/sleep trigger

# Single master toggle to show/hide ALL configured drive spindown buttons at once
mqtt_btn_spindown_enabled=0


# ==============================================================================
# 03. STORAGE & DISK SPINDOWN
# ==============================================================================
# Monitors drive state and enforces a software spindown timer.
# Recommended for controllers or drives where standard "hdparm -S" is unsupported.

spindown_enabled=0

# Configured Drives (Spindown timeout is in seconds; set to 0 to skip a drive)
# spindown_drive_count=2
#
# spindown_drive_1=/dev/sda
# spindown_timeout_1=600
#
# spindown_drive_2=/dev/sdb
# spindown_timeout_2=600


# ==============================================================================
# 04. TEMPERATURE-CONTROLLED FAN (PWM)
# ==============================================================================
# Dynamically adjusts fan speeds between minimum and maximum PWM thresholds.
# Requires both a writable PWM node and a matching enable/mode selection node.

fan_control_enabled=0

# Hardware paths
# temp_sensor_path=/sys/class/hwmon/hwmon1/temp1_input
# pwm_enable_path=/sys/class/hwmon/hwmon0/pwm1_enable
# pwm_file_path=/sys/class/hwmon/hwmon0/pwm1

# Fan profile parameters
# fan_start_temp=45            # Temp (°C) at which the fan starts spinning
# fan_max_temp=65              # Temp (°C) at which the fan reaches maximum speed
# fan_crit_temp=80             # Critical thermal threshold (may trigger safeguards)
# fan_min_pwm=0                # Minimum speed offset (0 - 255)
# fan_max_pwm=255              # Maximum speed offset (0 - 255)


# ==============================================================================
# 05. PHYSICAL POWER SWITCH MONITORING
# ==============================================================================
# Monitors physical switch state via Linux input-event interfaces.
# Automatically triggers a safe software shutdown when toggled to the 'off' state.

power_switch_monitor_enabled=0

# Hardware path and event codes
# power_switch_input_device=/dev/input/event0
# power_sw_code=0
# auto_sw_code=1
# off_shutdown_delay_sec=2     # Seconds to wait before executing shutdown command


# ==============================================================================
# 06. SYSTEM LED CONTROL
# ==============================================================================
# Configures system LEDs to indicate status conditions.
# The daemon writes to /sys/class/leds/<led_name>/brightness.
# Supported led_purposes:
#   - standby:          Matches drive state. Turn ON/OFF when disk is sleeping.
#   - temp_limit:       Triggers if CPU/SoC exceeds a defined °C threshold.
#   - disk_almost_full: Triggers if storage mount capacity exceeds a defined percentage.

led_control_enabled=0
# leds_count=3

# --- LED 1: Standby Indication (e.g. Blue Function LED) ---
# led_name_1=linkstation:blue:function
# led_purpose_1=standby
# led_disk_device_1=/dev/sda
# led_on_value_1=0              # Set on_value=0 & off_value=1 to turn OFF the LED
# led_off_value_1=1             # when the monitored disk goes to standby.
# led_poll_interval_sec_1=5

# --- LED 2: Temperature Alert (e.g. Amber Info LED) ---
# led_name_2=linkstation:amber:info
# led_purpose_2=temp_limit
# led_temp_threshold_c_2=80
# led_on_value_2=1              # Turn ON when temperature threshold is reached
# led_off_value_2=0             # Turn OFF when safe

# --- LED 3: Storage Capacity Warning (e.g. Red Alarm LED) ---
# led_name_3=linkstation:red:alarm
# led_purpose_3=disk_almost_full
# led_disk_almost_full_pct_3=90
# led_on_value_3=1              # Turn ON if filesystem usage > threshold percentage
# led_off_value_3=0             # Turn OFF when space is cleared