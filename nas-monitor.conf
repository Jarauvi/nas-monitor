# NAS monitor configuration
# Copy to /etc/nas-monitor.conf and adjust to your hardware.

# Debug output
# Set to 1 to force stdout debug messages even when the daemon is not running interactively.
debug_enabled=0

# MQTT / Home Assistant
mqtt_enabled=1
ha_discovery_enabled=1
mqtt_address=tcp://192.168.1.234:5678
client_id=Linkstation
username=mqtt_user
password=secret

# Filesystem mount used for disk utilization reporting
storage_mount=/mnt/storage

# Disk spindown / standby handling
spindown_enabled=0
# Optional per-drive spindown configuration. If a timeout is 0, that drive is skipped.
# spindown_drive_count=2
# spindown_drive_1=/dev/sda
# spindown_timeout_1=600
# spindown_drive_2=/dev/sdb
# spindown_timeout_2=600

# Fan control (PWM)
# Enable this only if your board exposes a writable PWM node and a matching enable node.
fan_control_enabled=0
# temp_sensor_path=/sys/class/hwmon/hwmon1/temp1_input
# pwm_enable_path=/sys/class/hwmon/hwmon0/pwm1_enable
# pwm_file_path=/sys/class/hwmon/hwmon0/pwm1
# fan_start_temp=45
# fan_max_temp=65
# fan_crit_temp=80
# fan_min_pwm=0
# fan_max_pwm=255

# Power switch monitoring
# Set to 1 if your platform exposes an input-event device for the power/auto switches.
power_switch_monitor_enabled=0
# power_switch_input_device=/dev/input/event0
# power_sw_code=0
# auto_sw_code=1
# off_shutdown_delay_sec=2

# LED control
# Supported purposes: standby, temp_limit, disk_almost_full
# The daemon will write to /sys/class/leds/<name>/brightness after disabling the LED trigger.

led_control_enabled=0
# leds_count=1

# LED #1 example: standby indication
# The standby logic uses on_value when the drive is in standby and off_value when active.
# To mimic the original shell script behavior, set on_value=0 and off_value=1.
# led_name_1=linkstation:blue:function
# led_purpose_1=standby
# led_disk_device_1=/dev/sda
# led_on_value_1=0
# led_off_value_1=1
# led_poll_interval_sec_1=5

# LED #2 example: temperature threshold
# led_name_2=linkstation:amber:info
# led_purpose_2=temp_limit
# led_temp_threshold_c_2=80
# led_on_value_2=1
# led_off_value_2=0

# LED #3 example: storage usage threshold
# led_name_3=linkstation:red:alarm
# led_purpose_3=disk_almost_full
# led_disk_almost_full_pct_3=90
# led_on_value_3=1
# led_off_value_3=0


